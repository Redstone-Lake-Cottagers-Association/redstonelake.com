# fly.toml app configuration file generated for redstonelake-com
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'redstonelake-com'
primary_region = 'yyz'

[build]
  # Flip to "rala" (and redeploy) to rebrand the site to the new association
  # name once the non-profit application clears and members are notified.
  [build.args]
    NEXT_PUBLIC_BRAND = "legacy"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  NODE_ENV = 'production'
